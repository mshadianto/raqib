          <div style=${{ display: "grid", gridTemplateColumns: "repeat(3, 1fr)", gap: 16 }}>
            ${planCards}
          </div>
        </div>
      `;
    }

    // Main App
    function MoniDashboard() {
      var pageRef = useState("overview"), page = pageRef[0], setPage = pageRef[1];
      var collRef = useState(false), collapsed = collRef[0], setCollapsed = collRef[1];

      var pages = {
        overview: OverviewPage,
        regulatory: RegulatoryPage,
        portfolio: PortfolioPage,
        audit: AuditPage,
        agents: AgentsPage,
        billing: BillingPage,
        settings: function() { return html`<div style=${{ color: "#64748B", fontSize: 14 }}>Settings page \u2014 coming soon</div>`; },
      };

      var PageComponent = pages[page] || OverviewPage;
      var pageTitle = {
        overview: "Command Center",
        regulatory: "Regulatory",
        portfolio: "Portfolio",
        audit: "Audit Trail",
        agents: "AI Agents",
        billing: "Billing",
        settings: "Settings",
      };

      return html`
        <div style=${{
          display: "flex",
          minHeight: "100vh",
          background: "#0A0F1E",
          fontFamily: "'DM Sans', 'Segoe UI', system-ui, sans-serif",
          color: "#F8FAFC",
        }}>
          <${Sidebar} active=${page} onNav=${setPage} collapsed=${collapsed} onToggle=${function() { setCollapsed(!collapsed); }} />
          <div style=${{ flex: 1, display: "flex", flexDirection: "column", minWidth: 0 }}>
            <div style=${{
              padding: "16px 32px",
              borderBottom: "1px solid rgba(255,255,255,0.06)",
              display: "flex", justifyContent: "space-between", alignItems: "center",
              background: "rgba(10,15,30,0.8)", backdropFilter: "blur(10px)",
              position: "sticky", top: 0, zIndex: 10,
            }}>
              <div>
                <div style=${{ fontSize: 18, fontWeight: 700, letterSpacing: "-0.02em" }}>${pageTitle[page]}</div>
                <div style=${{ fontSize: 12, color: "#64748B" }}>BPKH Compliance Team \u2022 Pro Plan</div>
              </div>
              <div style=${{ display: "flex", alignItems: "center", gap: 16 }}>
                <div style=${{
                  display: "flex", alignItems: "center", gap: 8,
                  padding: "6px 12px", borderRadius: 8,
                  background: "rgba(255,255,255,0.04)", border: "1px solid rgba(255,255,255,0.06)",
                }}>
                  <${Search} size=${14} color="#64748B" />
                  <span style=${{ fontSize: 12, color: "#475569" }}>Search... \u2318K</span>
                </div>
                <div style=${{ position: "relative" }}>
                  <${Bell} size=${18} color="#94A3B8" style=${{ cursor: "pointer" }} />
                  <div style=${{
                    position: "absolute", top: -4, right: -4,
                    width: 16, height: 16, borderRadius: "50%",
                    background: "#EF4444", display: "flex",
                    alignItems: "center", justifyContent: "center",
                    fontSize: 9, fontWeight: 700, color: "#fff",
                  }}>4</div>
                </div>
                <div style=${{
                  width: 32, height: 32, borderRadius: 8,
                  background: "linear-gradient(135deg, #F59E0B, #10B981)",
                  display: "flex", alignItems: "center", justifyContent: "center",
                  fontWeight: 700, fontSize: 13, color: "#fff", cursor: "pointer",
                }}>SH</div>
              </div>
            </div>
            <div style=${{ padding: 32, flex: 1, overflow: "auto" }}>
              <${PageComponent} />
            </div>
          </div>
        </div>
      `;
    }

    ReactDOM.createRoot(document.getElementById('root')).render(html`<${MoniDashboard} />`);
  });
  </script>
</body>
</html>
